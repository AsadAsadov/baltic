# Include these locations inside the balticcaspian.com server block after validating with `nginx -t`.
location /uploads/ {
    alias /var/www/balticcaspian/uploads/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri =404;
}

location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
    root /var/www/balticcaspian;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000" always;
    try_files $uri @node;
}

gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;
